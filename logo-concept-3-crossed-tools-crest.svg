<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&amp;family=DM+Serif+Display&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#1a1714"/>

  <!-- === SHIELD / BADGE BORDER === -->
  <path d="
    M200 60
    L310 95
    L310 260
    C310 310 260 350 200 370
    C140 350 90 310 90 260
    L90 95
    Z
  " fill="none" stroke="#d4845a" stroke-width="2.5" opacity="0.8"/>

  <!-- Inner shield line -->
  <path d="
    M200 72
    L302 104
    L302 258
    C302 304 255 340 200 358
    C145 340 98 304 98 258
    L98 104
    Z
  " fill="none" stroke="#d4845a" stroke-width="0.8" opacity="0.35"/>

  <!-- === "THE CHIPPY" text inside shield, top === -->
  <text x="200" y="128" text-anchor="middle" fill="#f0f0e8" font-family="'DM Sans', sans-serif" font-weight="700" font-size="28" letter-spacing="5">THE CHIPPY</text>

  <!-- Small decorative line under title -->
  <line x1="145" y1="138" x2="255" y2="138" stroke="#d4845a" stroke-width="1" opacity="0.5"/>

  <!-- === CROSSED HAMMERS === -->
  <g transform="translate(200, 230)">

    <!-- === Framing Hammer (left to right diagonal) === -->
    <g transform="rotate(-40)">
      <!-- Handle -->
      <rect x="-4" y="-10" width="8" height="100" rx="3" fill="#8b6e4e"/>
      <!-- Handle grip lines -->
      <line x1="-3" y1="50" x2="3" y2="50" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="56" x2="3" y2="56" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="62" x2="3" y2="62" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="68" x2="3" y2="68" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="74" x2="3" y2="74" stroke="#6b5238" stroke-width="0.8"/>
      <!-- Head (flat face + claw) -->
      <rect x="-18" y="-22" width="36" height="14" rx="2" fill="#d4845a"/>
      <!-- Head highlight -->
      <rect x="-18" y="-22" width="36" height="4" rx="2" fill="#e0956a" opacity="0.5"/>
      <!-- Claw (framing hammer has a straighter claw) -->
      <path d="M-18 -12 L-28 -24 L-25 -26 L-16 -14" fill="#c4754b"/>
      <!-- Face (striking end) -->
      <rect x="14" y="-22" width="6" height="14" rx="1" fill="#eaa87e" opacity="0.6"/>
    </g>

    <!-- === Cross-Peen (Blacksmith) Hammer (right to left diagonal) === -->
    <g transform="rotate(40)">
      <!-- Handle -->
      <rect x="-4" y="-10" width="8" height="95" rx="3" fill="#8b6e4e"/>
      <!-- Handle grip lines -->
      <line x1="-3" y1="48" x2="3" y2="48" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="54" x2="3" y2="54" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="60" x2="3" y2="60" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="66" x2="3" y2="66" stroke="#6b5238" stroke-width="0.8"/>
      <line x1="-3" y1="72" x2="3" y2="72" stroke="#6b5238" stroke-width="0.8"/>
      <!-- Head (flat face + cross peen) -->
      <rect x="-16" y="-20" width="32" height="14" rx="2" fill="#d4845a"/>
      <!-- Head highlight -->
      <rect x="-16" y="-20" width="32" height="4" rx="2" fill="#e0956a" opacity="0.5"/>
      <!-- Cross peen (wedge perpendicular to handle) -->
      <path d="M-16 -13 L-16 -7 L-22 -10 Z" fill="#c4754b"/>
      <!-- Face -->
      <rect x="12" y="-20" width="6" height="14" rx="1" fill="#eaa87e" opacity="0.6"/>
    </g>

    <!-- === EMBER / SPARK at crossing point === -->
    <circle cx="0" cy="0" r="6" fill="#e8834a" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="10" fill="#e8834a" opacity="0.2">
      <animate attributeName="r" values="10;14;10" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Small radiating sparks -->
    <circle cx="-8" cy="-6" r="1.5" fill="#f0a060" opacity="0.6"/>
    <circle cx="9" cy="-4" r="1.2" fill="#f0a060" opacity="0.5"/>
    <circle cx="-5" cy="8" r="1" fill="#e8834a" opacity="0.7"/>
    <circle cx="7" cy="7" r="1.3" fill="#f0a060" opacity="0.5"/>
  </g>

  <!-- === "PRECISION CARPENTRY" text inside shield, bottom === -->
  <text x="200" y="340" text-anchor="middle" fill="#d4845a" font-family="'DM Serif Display', serif" font-size="14" letter-spacing="3">PRECISION CARPENTRY</text>

  <!-- === EST. line (optional heritage detail) === -->
  <text x="200" y="358" text-anchor="middle" fill="#f0f0e8" font-family="'DM Sans', sans-serif" font-weight="500" font-size="10" letter-spacing="4" opacity="0.4">NEW BRUNSWICK, CANADA</text>

  <!-- === Bottom decorative elements outside shield === -->
  <line x1="120" y1="420" x2="280" y2="420" stroke="#d4845a" stroke-width="0.8" opacity="0.3"/>
  <text x="200" y="445" text-anchor="middle" fill="#f0f0e8" font-family="'DM Sans', sans-serif" font-weight="500" font-size="11" letter-spacing="6" opacity="0.5">FORGED WORK ETHIC</text>
</svg>