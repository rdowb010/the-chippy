<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=DM+Serif+Display&amp;display=swap');
    </style>
    <!-- Pencil texture filter -->
    <filter id="pencil" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Slightly rougher pencil for heavier strokes -->
    <filter id="pencilHeavy" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Paper grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="4" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Paper background — warm off-white -->
  <rect width="400" height="500" fill="#f5f0e6"/>
  <!-- Subtle paper grain -->
  <rect width="400" height="500" filter="url(#grain)" opacity="0.06"/>

  <!-- ============================================
       FLAT CAP — pencil line drawing
       ============================================ -->
  <g transform="translate(200, 148)" filter="url(#pencil)">
    <!-- Cap crown — main outline, slightly sketchy double-line effect -->
    <path d="M-72 14 C-72 14 -63 -36 0 -45 C63 -36 72 14 72 14"
          fill="none" stroke="#3a3530" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Second pass (sketch feel — slightly offset) -->
    <path d="M-71 15 C-71 15 -62 -35 1 -44 C64 -35 73 15 73 15"
          fill="none" stroke="#3a3530" stroke-width="0.6" stroke-linecap="round" opacity="0.35"/>

    <!-- Panel seams — light pencil -->
    <path d="M0 -45 L0 12" stroke="#3a3530" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
    <path d="M1 -44 L1 13" stroke="#3a3530" stroke-width="0.3" stroke-linecap="round" opacity="0.2"/>
    <path d="M0 -45 L-42 12" stroke="#3a3530" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>
    <path d="M0 -45 L42 12" stroke="#3a3530" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>

    <!-- Fabric shading — hatching lines -->
    <g opacity="0.15" stroke="#3a3530" stroke-width="0.5" stroke-linecap="round">
      <line x1="-45" y1="-5" x2="-30" y2="-18"/>
      <line x1="-40" y1="0" x2="-25" y2="-13"/>
      <line x1="-35" y1="5" x2="-20" y2="-8"/>
      <line x1="-50" y1="2" x2="-35" y2="-12"/>
      <line x1="30" y1="-5" x2="48" y2="-18"/>
      <line x1="25" y1="0" x2="43" y2="-13"/>
      <line x1="35" y1="2" x2="52" y2="-10"/>
      <line x1="20" y1="5" x2="38" y2="-8"/>
    </g>

    <!-- Cross-hatching on the darker side -->
    <g opacity="0.08" stroke="#3a3530" stroke-width="0.4" stroke-linecap="round">
      <line x1="-48" y1="-12" x2="-28" y2="-2"/>
      <line x1="-43" y1="-17" x2="-23" y2="-7"/>
      <line x1="-38" y1="-22" x2="-18" y2="-12"/>
    </g>

    <!-- Button — small circle with cross -->
    <circle cx="0" cy="-45" r="3.5" fill="none" stroke="#3a3530" stroke-width="1.2"/>
    <circle cx="1" cy="-44" r="3.5" fill="none" stroke="#3a3530" stroke-width="0.3" opacity="0.3"/>
    <line x1="-2" y1="-45" x2="2" y2="-45" stroke="#3a3530" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="-47" x2="0" y2="-43" stroke="#3a3530" stroke-width="0.6" opacity="0.4"/>

    <!-- Band -->
    <line x1="-73" y1="14" x2="73" y2="14" stroke="#3a3530" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-73" y1="18" x2="73" y2="18" stroke="#3a3530" stroke-width="1" stroke-linecap="round"/>
    <!-- Band second pass -->
    <line x1="-72" y1="15" x2="74" y2="15" stroke="#3a3530" stroke-width="0.3" opacity="0.25"/>

    <!-- Brim -->
    <path d="M-73 16 L-88 26 C-88 29 -62 32 -22 30 L-4 28"
          fill="none" stroke="#3a3530" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Brim second pass -->
    <path d="M-72 17 L-87 27 C-87 30 -61 33 -21 31 L-3 29"
          fill="none" stroke="#3a3530" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Brim underside shading -->
    <g opacity="0.12" stroke="#3a3530" stroke-width="0.4" stroke-linecap="round">
      <line x1="-80" y1="24" x2="-65" y2="20"/>
      <line x1="-72" y1="26" x2="-57" y2="22"/>
      <line x1="-64" y1="28" x2="-49" y2="24"/>
      <line x1="-56" y1="29" x2="-41" y2="25"/>
      <line x1="-45" y1="29" x2="-32" y2="25"/>
    </g>
  </g>

  <!-- ============================================
       CHISEL — pencil line drawing, slight angle
       ============================================ -->
  <g transform="translate(170, 260) rotate(-8)" filter="url(#pencil)">
    <!-- Blade -->
    <path d="M-4 -20 L-7 -5 L7 -5 L4 -20 Z" fill="none" stroke="#3a3530" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Blade second pass -->
    <path d="M-3 -20 L-6 -5 L8 -5 L5 -20 Z" fill="none" stroke="#3a3530" stroke-width="0.35" opacity="0.3" stroke-linecap="round"/>
    <!-- Blade edge shading -->
    <line x1="-2" y1="-18" x2="3" y2="-18" stroke="#3a3530" stroke-width="0.5" opacity="0.3"/>
    <line x1="-5" y1="-10" x2="5" y2="-10" stroke="#3a3530" stroke-width="0.4" opacity="0.15"/>

    <!-- Ferrule -->
    <rect x="-6" y="-5" width="12" height="5" rx="0.5" fill="none" stroke="#3a3530" stroke-width="1"/>

    <!-- Handle -->
    <path d="M-5 0 L-4.5 45 C-4.5 47 4.5 47 4.5 45 L5 0 Z" fill="none" stroke="#3a3530" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle second pass -->
    <path d="M-4 1 L-3.5 44 C-3.5 46 3.5 46 3.5 44 L4 1 Z" fill="none" stroke="#3a3530" stroke-width="0.3" opacity="0.25"/>
    <!-- Handle wood grain -->
    <line x1="-2" y1="8" x2="-2.5" y2="38" stroke="#3a3530" stroke-width="0.4" opacity="0.15"/>
    <line x1="1" y1="5" x2="0.5" y2="40" stroke="#3a3530" stroke-width="0.3" opacity="0.12"/>
  </g>

  <!-- ============================================
       FINISH HAMMER — pencil line, crossing the chisel
       ============================================ -->
  <g transform="translate(230, 258) rotate(12)" filter="url(#pencil)">
    <!-- Handle -->
    <path d="M-3 -8 L-3 48 C-3 50 3 50 3 48 L3 -8 Z" fill="none" stroke="#3a3530" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle second pass -->
    <path d="M-2 -7 L-2 47 C-2 49 2 49 2 47 L2 -7 Z" fill="none" stroke="#3a3530" stroke-width="0.3" opacity="0.25"/>
    <!-- Handle grain -->
    <line x1="-1" y1="5" x2="-1" y2="42" stroke="#3a3530" stroke-width="0.35" opacity="0.12"/>
    <line x1="1.5" y1="8" x2="1.5" y2="40" stroke="#3a3530" stroke-width="0.3" opacity="0.1"/>

    <!-- Head -->
    <rect x="-15" y="-18" width="30" height="11" rx="1.5" fill="none" stroke="#3a3530" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- Head second pass -->
    <rect x="-14" y="-17" width="28" height="9" rx="1" fill="none" stroke="#3a3530" stroke-width="0.35" opacity="0.25"/>

    <!-- Claw -->
    <path d="M13 -9 L19 -22 L17 -23 L11 -11" fill="none" stroke="#3a3530" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 -9 L20 -22" stroke="#3a3530" stroke-width="0.35" opacity="0.25" stroke-linecap="round"/>

    <!-- Head shading hatching -->
    <g opacity="0.1" stroke="#3a3530" stroke-width="0.4">
      <line x1="-12" y1="-16" x2="-12" y2="-9"/>
      <line x1="-9" y1="-16" x2="-9" y2="-9"/>
      <line x1="-6" y1="-16" x2="-6" y2="-9"/>
    </g>
  </g>

  <!-- Small pencil-drawn ember spark at tool crossing -->
  <g transform="translate(200, 272)" filter="url(#pencil)">
    <circle cx="0" cy="0" r="3" fill="none" stroke="#8b6040" stroke-width="0.8" opacity="0.5"/>
    <line x1="-5" y1="-3" x2="-3" y2="-1" stroke="#8b6040" stroke-width="0.5" opacity="0.35"/>
    <line x1="4" y1="-4" x2="2" y2="-1" stroke="#8b6040" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-6" x2="0" y2="-3" stroke="#8b6040" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- ============================================
       TYPOGRAPHY — pencil style, hand-drawn feel
       ============================================ -->

  <!-- Thin hand-drawn divider line -->
  <g filter="url(#pencil)">
    <line x1="120" y1="345" x2="280" y2="345" stroke="#3a3530" stroke-width="0.7" stroke-linecap="round" opacity="0.3"/>
    <line x1="122" y1="346" x2="278" y2="346" stroke="#3a3530" stroke-width="0.25" stroke-linecap="round" opacity="0.15"/>
  </g>

  <!-- THE CHIPPY -->
  <text x="200" y="382" text-anchor="middle" fill="#3a3530" font-family="'DM Sans', sans-serif" font-weight="700" font-size="36" letter-spacing="5" filter="url(#pencil)">THE CHIPPY</text>
  <!-- Ghost double (pencil sketch effect) -->
  <text x="201" y="383" text-anchor="middle" fill="#3a3530" font-family="'DM Sans', sans-serif" font-weight="700" font-size="36" letter-spacing="5" opacity="0.08" filter="url(#pencilHeavy)">THE CHIPPY</text>

  <!-- Precision Carpentry -->
  <text x="200" y="410" text-anchor="middle" fill="#6b5a48" font-family="'DM Serif Display', serif" font-size="17" letter-spacing="2" filter="url(#pencil)">Precision Carpentry</text>

  <!-- Bottom line -->
  <g filter="url(#pencil)">
    <line x1="145" y1="425" x2="255" y2="425" stroke="#3a3530" stroke-width="0.5" stroke-linecap="round" opacity="0.2"/>
  </g>

  <text x="200" y="448" text-anchor="middle" fill="#3a3530" font-family="'DM Sans', sans-serif" font-weight="400" font-size="9" letter-spacing="4" opacity="0.35" filter="url(#pencil)">TRIM &amp; FINISH  ·  NEW BRUNSWICK</text>
</svg>